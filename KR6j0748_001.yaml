body:
  text: 金剛界遮那金薩龍猛龍智金智無畏不空含光保壽寺惠朗大興善寺天竺阿闍梨崇福寺德美惠謹俗居士趙梅曇貞青龍寺覺超保壽寺契如惠德惠果惠應大興善寺惠則同惟尚城都府辨弘汴州惠日新羅國空日本國義滿青龍寺義明同義操同法潤青龍寺義真同義舟同義圓同深達景公寺海雲淨住寺大遇崇福寺從賀醴泉寺文同均亮新羅國或均諒常堅青龍寺法全玄法寺敬友安國寺文懿同智滿永保寺自怤興唐寺惠怤薦福寺弘印新羅國圓仁日本國圓載同圓珍同遍明同真如親王弘悅青龍寺俗居士茂炫建武郭文秘同義照同義愍同義政同義一龍興寺俗居士吳殷批云巨唐大和八年歲在甲寅仲秋月二十日淨住寺梵字傳教沙門海雲集胎藏界遮那金手掬多無畏金智不空一行大興善寺玄超保壽寺惠果青龍寺惠應大興善寺惠則同惟上或云惟明成都府辨弘汴州惠日新羅國悟真同空日本國義滿青龍寺義明同義操同義真東塔院深達景公寺海雲淨住寺大遇崇福寺文醴泉寺義慜同法潤同道昇淨住寺法全玄法寺敬友安國寺文懿永壽寺智滿永保寺弘印新羅國操玄慈恩寺圓仁日本國圓載同圓珍同遍明同宗叡同弘悅青龍寺文逸安國寺茂炫丁建武唯謹同批云巨唐大和八年歲次甲寅十月上旬有八日淨住寺傳教苾蒭海雲集
